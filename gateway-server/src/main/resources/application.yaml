spring:
  application:
    name: gateway-server
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8181/realms/master/protocol/openid-connect/certs
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          routes:
            - id: BOOKING-SERVICE
              uri:
                "lb://BOOKING-SERVICE"
              predicates:
                - Path= /api/bookings/**

            - id: PAYMENT-SERVICE
              uri:
                "lb://PAYMENT-SERVICE"
              predicates:
                - Path= /api/payments/**

            - id: CATEGORY-SERVICE
              uri:
                "lb://CATEGORY-SERVICE"
              predicates:
                - Path= /api/category/**

            - id: OFFERING-SERVICE
              uri:
                "lb://OFFERING-SERVICE"
              predicates:
                - Path= /api/service-offering/**

            - id: SALON-SERVICE
              uri:
                "lb://SALON-SERVICE"
              predicates:
                - Path= /salons/, /api/salons/**, /api/admin/salons/**

            - id: USER-SERVICE
              uri: "lb://USER-SERVICE"
              predicates:
                - Path=/api/users/**
                - Path=/auth/**
                - Path=/api/admin/users/**
                - Path=/users/**

            - id: NOTIFICATION-SERVICE
              uri:
                "lb://NOTIFICATION-SERVICE"
              predicates:
                - Path= /api/notifications/**
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka/

server:
  port: 5111